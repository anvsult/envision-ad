spring:
  flyway:
    enabled: false

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        auto-quote-keyword: true

  mail:
    host: ${EMAIL_SMTP:localhost}
    port: ${EMAIL_PORT:25}
    username: ${EMAIL_USER:}
    password: ${EMAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# Backend health check
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: when-authorized
  health:
    mail:
      enabled: false

okta:
  oauth2:
    issuer: "https://${AUTH0_DOMAIN:test.auth0.com}/"
    audience: ${AUTH0_AUDIENCE:test-audience}

auth0:
  management:
    client-id: ${AUTH0_MGMT_CLIENT_ID:test-mgmt-client-id}
    client-secret: ${AUTH0_MGMT_CLIENT_SECRET:test-mgmt-client-secret}
    audience: https://${AUTH0_DOMAIN:test.auth0.com}/api/v2/
    token-url: https://${AUTH0_MGMT_DOMAIN:test.auth0.com}/oauth/token
    base-url: https://${AUTH0_MGMT_DOMAIN:test.auth0.com}/
app:
  base:
    url: ${APP_BASE_URL:http://localhost:8080}

stripe:
  api-key: ${STRIPE_SECRET_KEY:test_stripe_secret_key}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:test_webhook_secret}
  platform-fee-percent: 30
  connect:
    client-id: ${STRIPE_CONNECT_CLIENT_ID:test_client_id}
